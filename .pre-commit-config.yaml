repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
        exclude: "^config/"
      - id: end-of-file-fixer
        exclude: "^(data/|dat/|config/)"
      - id: trailing-whitespace
        exclude: "^(data/|dat/|config/)"

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        pass_filenames: false
